# GitHub Actions workflow for building, testing, and releasing the Kinesis Android app

name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # This job runs on every push and pull request to 'main'
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Android Lint
      run: ./gradlew lintDebug

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest

    - name: Upload Lint reports
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: app/build/reports/lint-results-debug.html
        
  # This job runs ONLY when you push a tag like 'v1.0.0'
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      id: decode_keystore
      env:
        ENCODED_STRING: ${{ secrets.SIGNING_KEY_BASE64 }}
      run: |
        echo $ENCODED_STRING | base64 --decode > release.keystore
        echo "keystorePath=$(pwd)/release.keystore" >> $GITHUB_OUTPUT

    - name: Assemble Release App Bundle
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew bundleRelease --no-daemon

    - name: Create GitHub Release and Upload Artifact
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/bundle/release/app-release.aab
        body: "Automated release based on commit."
